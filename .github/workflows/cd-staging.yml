name: CD Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  HELM_NAMESPACE: mdm-staging

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        service:
          - { name: device-service, dockerfile: infra/docker/device-service.Dockerfile }
          - { name: policy-service, dockerfile: infra/docker/policy-service.Dockerfile }
          - { name: command-service, dockerfile: infra/docker/command-service.Dockerfile }
          - { name: admin-api, dockerfile: infra/docker/admin-api.Dockerfile }
          - { name: admin-console, dockerfile: infra/docker/admin-console.Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/mdm/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/mdm/${{ matrix.service.name }}:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name mdm-staging --region ${{ env.AWS_REGION }}

      - uses: azure/setup-helm@v5

      - name: Deploy services
        run: |
          for service in device-service policy-service command-service admin-api admin-console; do
            helm upgrade --install "$service" \
              ./infra/helm/"$service" \
              --namespace "${{ env.HELM_NAMESPACE }}" \
              --create-namespace \
              --set image.repository="${{ env.ECR_REGISTRY }}/mdm/$service" \
              --set image.tag="${{ github.sha }}" \
              --wait --timeout 5m
          done
