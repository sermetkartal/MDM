openapi: 3.1.0
info:
  title: MDM Platform API
  description: REST API for the MDM admin console. Manages devices, policies, apps, compliance, and more.
  version: 1.0.0
  contact:
    name: MDM Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:3001/api/v1
    description: Local development
  - url: https://api.staging.mdm.example.com/api/v1
    description: Staging
  - url: https://api.mdm.example.com/api/v1
    description: Production

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: auth
    description: Authentication and session management
  - name: devices
    description: Device management and commands
  - name: policies
    description: Policy lifecycle and assignments
  - name: groups
    description: Device group management
  - name: commands
    description: Command management and bulk operations
  - name: apps
    description: Application management, versions, and assignments
  - name: kiosk
    description: Kiosk profile management
  - name: compliance
    description: Compliance rules, status, and violations
  - name: geofences
    description: Geofence management
  - name: audit
    description: Audit log queries
  - name: webhooks
    description: Webhook management and delivery history
  - name: enrollment
    description: Device enrollment configurations and QR codes

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    SortByParam:
      name: sortBy
      in: query
      schema:
        type: string
        default: createdAt
    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    ApiError:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: object
        requestId:
          type: string

    Platform:
      type: string
      enum: [ios, android, windows, macos, linux]

    DeviceStatus:
      type: string
      enum: [enrolled, pending, blocked, wiped, retired]

    ComplianceStatus:
      type: string
      enum: [compliant, non_compliant, unknown]

    CommandStatus:
      type: string
      enum: [pending, queued, delivered, acknowledged, completed, failed, cancelled]

    Severity:
      type: string
      enum: [low, medium, high, critical]

    AppType:
      type: string
      enum: [public, enterprise, web_clip]

    # --- Auth ---
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        orgId:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    TokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token lifetime in seconds

    # --- Device ---
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        udid:
          type: string
        serialNumber:
          type: string
        name:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        osVersion:
          type: string
        model:
          type: string
        manufacturer:
          type: string
        status:
          $ref: '#/components/schemas/DeviceStatus'
        complianceStatus:
          $ref: '#/components/schemas/ComplianceStatus'
        lastSeenAt:
          type: string
          format: date-time
        enrolledAt:
          type: string
          format: date-time
        deviceInfo:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DeviceListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Device'
        pagination:
          $ref: '#/components/schemas/Pagination'

    SendCommandRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          minLength: 1
        payload:
          type: object
          default: {}

    # --- Policy ---
    Policy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        version:
          type: integer
        payload:
          type: object
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePolicyRequest:
      type: object
      required: [name, platform, payload]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        payload:
          type: object

    UpdatePolicyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        payload:
          type: object
        isActive:
          type: boolean

    PolicyAssignmentRequest:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid

    PolicyVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyId:
          type: string
          format: uuid
        version:
          type: integer
        payload:
          type: object
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    PolicyListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Device Group ---
    DeviceGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        isDynamic:
          type: boolean
        dynamicFilter:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        isDynamic:
          type: boolean
          default: false
        dynamicFilter:
          type: object

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        dynamicFilter:
          type: object

    AddGroupMemberRequest:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          format: uuid

    GroupListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeviceGroup'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Command ---
    Command:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        type:
          type: string
        payload:
          type: object
        status:
          $ref: '#/components/schemas/CommandStatus'
        result:
          type: object
        issuedBy:
          type: string
          format: uuid
        issuedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    BulkCommandRequest:
      type: object
      required: [type, deviceIds]
      properties:
        type:
          type: string
          minLength: 1
        payload:
          type: object
          default: {}
        deviceIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 500

    CommandListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Command'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- App ---
    App:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        bundleId:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        type:
          $ref: '#/components/schemas/AppType'
        iconUrl:
          type: string
          format: uri
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAppRequest:
      type: object
      required: [name, bundleId, platform]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        bundleId:
          type: string
          minLength: 1
          maxLength: 255
        platform:
          $ref: '#/components/schemas/Platform'
        type:
          $ref: '#/components/schemas/AppType'
        iconUrl:
          type: string
          format: uri
        description:
          type: string

    UpdateAppRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        iconUrl:
          type: string
          format: uri
        description:
          type: string

    CreateAppVersionRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
          minLength: 1
        downloadUrl:
          type: string
          format: uri
        releaseNotes:
          type: string

    AppAssignmentRequest:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        isRequired:
          type: boolean
          default: false

    AppVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        version:
          type: string
        downloadUrl:
          type: string
        releaseNotes:
          type: string
        createdAt:
          type: string
          format: date-time

    AppListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/App'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Kiosk Profile ---
    KioskProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        allowedApps:
          type: array
          items:
            type: string
        wallpaperUrl:
          type: string
        autoLaunchApp:
          type: string
        exitPassword:
          type: string
        settings:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateKioskProfileRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        allowedApps:
          type: array
          items:
            type: string
          default: []
        wallpaperUrl:
          type: string
          format: uri
        autoLaunchApp:
          type: string
        exitPassword:
          type: string
        settings:
          type: object
          default: {}

    UpdateKioskProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        allowedApps:
          type: array
          items:
            type: string
        wallpaperUrl:
          type: string
          format: uri
        autoLaunchApp:
          type: string
        exitPassword:
          type: string
        settings:
          type: object

    KioskProfileListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/KioskProfile'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Compliance ---
    ComplianceRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        condition:
          type: object
        severity:
          $ref: '#/components/schemas/Severity'
        action:
          type: object
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateComplianceRuleRequest:
      type: object
      required: [name, condition]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        condition:
          type: object
        severity:
          $ref: '#/components/schemas/Severity'
        action:
          type: object
          default: {}
        isActive:
          type: boolean
          default: true

    UpdateComplianceRuleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        condition:
          type: object
        severity:
          $ref: '#/components/schemas/Severity'
        action:
          type: object
        isActive:
          type: boolean

    ComplianceStatusSummary:
      type: object
      required: [compliant, nonCompliant, unknown]
      properties:
        compliant:
          type: integer
        nonCompliant:
          type: integer
        unknown:
          type: integer

    ComplianceViolation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        ruleId:
          type: string
          format: uuid
        details:
          type: object
        resolvedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ComplianceRuleListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceRule'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ViolationListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceViolation'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Geofence ---
    Geofence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        radiusMeters:
          type: integer
        action:
          type: object
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateGeofenceRequest:
      type: object
      required: [name, latitude, longitude, radiusMeters]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        radiusMeters:
          type: integer
          minimum: 50
          maximum: 100000
        action:
          type: object
          default: {}
        isActive:
          type: boolean
          default: true

    UpdateGeofenceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        radiusMeters:
          type: integer
          minimum: 50
          maximum: 100000
        action:
          type: object
        isActive:
          type: boolean

    GeofenceListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Geofence'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Audit Log ---
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
        resource:
          type: string
        resourceId:
          type: string
          format: uuid
        details:
          type: object
        ipAddress:
          type: string
        userAgent:
          type: string
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Webhook ---
    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          minItems: 1
        status:
          type: string
          enum: [active, inactive]
          default: active

    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]

    WebhookWithSecret:
      allOf:
        - $ref: '#/components/schemas/Webhook'
        - type: object
          properties:
            secret:
              type: string

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        webhookId:
          type: string
          format: uuid
        event:
          type: string
        payload:
          type: object
        responseStatus:
          type: integer
        responseBody:
          type: string
        deliveredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    WebhookListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
        pagination:
          $ref: '#/components/schemas/Pagination'

    WebhookDeliveryListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookDelivery'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Enrollment ---
    EnrollmentConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        token:
          type: string
        maxEnrollments:
          type: integer
        currentEnrollments:
          type: integer
        defaultGroupId:
          type: string
          format: uuid
        defaultPolicyId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEnrollmentConfigRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        platform:
          $ref: '#/components/schemas/Platform'
        maxEnrollments:
          type: integer
          minimum: 1
        defaultGroupId:
          type: string
          format: uuid
        defaultPolicyId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time

    EnrollmentQrResponse:
      type: object
      properties:
        enrollmentToken:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        configId:
          type: string
          format: uuid
        qrData:
          type: string

    EnrollmentConfigListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentConfig'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Shared ---
    PolicyAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    AppAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        isRequired:
          type: boolean
        createdAt:
          type: string
          format: date-time

    GroupMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NoContent:
      description: Successful deletion, no content returned

paths:
  # ==================== AUTH ====================
  /auth/login:
    post:
      operationId: login
      summary: Authenticate and obtain JWT tokens
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh JWT tokens
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
