# Staging environment overrides
# Usage: helm install <chart> -f values/staging.yaml

device-service:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: false
  env:
    LOG_LEVEL: "info"
    DATABASE_URL: "postgres://mdm:mdm@postgres:5432/mdm_devices?sslmode=require"
    REDIS_URL: "redis://redis:6379/0"
    NATS_URL: "nats://nats:4222"

policy-service:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
