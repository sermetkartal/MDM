# Production environment overrides
# Usage: helm install <chart> -f values/production.yaml

device-service:
  replicaCount: 3
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPU: 70
    targetMemory: 75
  env:
    LOG_LEVEL: "warn"
    DATABASE_URL: "postgres://mdm:mdm@postgres:5432/mdm_devices?sslmode=require"
    REDIS_URL: "redis://redis:6379/0"
    NATS_URL: "nats://nats:4222"

