replicaCount: 2

image:
  repository: mdm/admin-console
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  portName: http

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 75
  targetMemory: 80

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

env:
  NEXT_PUBLIC_API_URL: "http://admin-api:3001"
  LOG_LEVEL: "info"
  PORT: "3000"
  NODE_ENV: "production"
