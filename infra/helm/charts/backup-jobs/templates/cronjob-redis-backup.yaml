apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  labels:
    app.kubernetes.io/name: redis-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: OnFailure
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: redis-backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/scripts/redis-backup.sh"]
              env:
                - name: REDIS_HOST
                  value: {{ .Values.redis.host | quote }}
                - name: REDIS_PORT
                  value: {{ .Values.redis.port | quote }}
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.redis.secretName }}
                      key: {{ .Values.redis.secretPasswordKey }}
                - name: REDIS_DATA_DIR
                  value: {{ .Values.redis.dataDir | quote }}
                - name: S3_BACKUP_BUCKET
                  value: {{ .Values.s3.bucket | quote }}
                - name: S3_BACKUP_PREFIX
                  value: "{{ .Values.s3.prefix }}/redis"
                - name: NOTIFICATION_WEBHOOK
                  value: {{ .Values.notification.webhookUrl | quote }}
                - name: AWS_DEFAULT_REGION
                  value: {{ .Values.s3.region | quote }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: redis-data
                  mountPath: {{ .Values.redis.dataDir }}
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
            - name: redis-data
              persistentVolumeClaim:
                claimName: redis-data
                readOnly: true
