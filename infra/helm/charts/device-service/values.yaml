replicaCount: 2

image:
  repository: mdm/device-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50051
  portName: grpc

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 75
  targetMemory: 80

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

env:
  DATABASE_URL: "postgres://mdm:mdm@postgres:5432/mdm_devices?sslmode=disable"
  REDIS_URL: "redis://redis:6379/0"
  NATS_URL: "nats://nats:4222"
  LOG_LEVEL: "info"
  GRPC_PORT: "50051"
