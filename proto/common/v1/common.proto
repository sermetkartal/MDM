syntax = "proto3";

package mdm.common.v1;

option go_package = "github.com/sermetkartal/mdm/gen/go/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

// Pagination

message PaginationRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PaginationResponse {
  string next_page_token = 1;
  int32 total_count = 2;
}

// Status enums

enum DeviceStatus {
  DEVICE_STATUS_UNSPECIFIED = 0;
  DEVICE_STATUS_ONLINE = 1;
  DEVICE_STATUS_OFFLINE = 2;
  DEVICE_STATUS_ENROLLED = 3;
  DEVICE_STATUS_UNENROLLING = 4;
  DEVICE_STATUS_UNENROLLED = 5;
  DEVICE_STATUS_WIPED = 6;
}

enum ComplianceState {
  COMPLIANCE_STATE_UNSPECIFIED = 0;
  COMPLIANCE_STATE_COMPLIANT = 1;
  COMPLIANCE_STATE_NON_COMPLIANT = 2;
  COMPLIANCE_STATE_PENDING = 3;
  COMPLIANCE_STATE_UNKNOWN = 4;
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_PENDING = 1;
  COMMAND_STATUS_QUEUED = 2;
  COMMAND_STATUS_SENT = 3;
  COMMAND_STATUS_DELIVERED = 4;
  COMMAND_STATUS_ACKNOWLEDGED = 5;
  COMMAND_STATUS_COMPLETED = 6;
  COMMAND_STATUS_FAILED = 7;
  COMMAND_STATUS_EXPIRED = 8;
  COMMAND_STATUS_CANCELLED = 9;
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_LOCK = 1;
  COMMAND_TYPE_UNLOCK = 2;
  COMMAND_TYPE_WIPE = 3;
  COMMAND_TYPE_SELECTIVE_WIPE = 4;
  COMMAND_TYPE_REBOOT = 5;
  COMMAND_TYPE_INSTALL_APP = 6;
  COMMAND_TYPE_UNINSTALL_APP = 7;
  COMMAND_TYPE_SET_POLICY = 8;
  COMMAND_TYPE_CLEAR_PASSCODE = 9;
  COMMAND_TYPE_ENABLE_KIOSK = 10;
  COMMAND_TYPE_DISABLE_KIOSK = 11;
  COMMAND_TYPE_REQUEST_LOCATION = 12;
  COMMAND_TYPE_SEND_MESSAGE = 13;
  COMMAND_TYPE_REMOTE_SHELL = 14;
  COMMAND_TYPE_RING_DEVICE = 15;
  COMMAND_TYPE_SET_BRIGHTNESS = 16;
  COMMAND_TYPE_SET_VOLUME = 17;
}

enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  POLICY_TYPE_RESTRICTION = 1;
  POLICY_TYPE_WIFI = 2;
  POLICY_TYPE_VPN = 3;
  POLICY_TYPE_PASSCODE = 4;
  POLICY_TYPE_KIOSK = 5;
  POLICY_TYPE_APP_MANAGEMENT = 6;
  POLICY_TYPE_COMPLIANCE = 7;
  POLICY_TYPE_GEOFENCE = 8;
  POLICY_TYPE_CERTIFICATE = 9;
  POLICY_TYPE_CUSTOM = 10;
}

enum KioskMode {
  KIOSK_MODE_UNSPECIFIED = 0;
  KIOSK_MODE_SINGLE_APP = 1;
  KIOSK_MODE_MULTI_APP = 2;
  KIOSK_MODE_DIGITAL_SIGNAGE = 3;
  KIOSK_MODE_WEB_KIOSK = 4;
}

enum EnrollmentMethod {
  ENROLLMENT_METHOD_UNSPECIFIED = 0;
  ENROLLMENT_METHOD_QR_CODE = 1;
  ENROLLMENT_METHOD_NFC = 2;
  ENROLLMENT_METHOD_ZERO_TOUCH = 3;
  ENROLLMENT_METHOD_KNOX = 4;
  ENROLLMENT_METHOD_MANUAL = 5;
}
